server {
    listen 72.61.1.109:80;
    server_name blog.yas.ooo;
    return 301 https://$host$request_uri;
}

server {
    listen 72.61.1.109:443 ssl;
    http2 on;
    server_name blog.yas.ooo;

    ssl_certificate /etc/ssl/certs/yas-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/yas-selfsigned.key;

    client_max_body_size 20m;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass http://127.0.0.1:3299;
    }
}
