server {
    listen 72.61.1.109:80;
    server_name georivo.com www.georivo.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        default_type text/plain;
    }

    location / {
        return 301 https://georivo.com$request_uri;
    }
}

server {
    listen 72.61.1.109:443 ssl;
    server_name www.georivo.com;

    ssl_certificate /etc/letsencrypt/live/georivo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/georivo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://georivo.com$request_uri;
}

server {
    listen 72.61.1.109:443 ssl;
    server_name georivo.com;

    ssl_certificate /etc/letsencrypt/live/georivo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/georivo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /georivo-mobile-fix.css {
        alias /etc/nginx/georivo-mobile-fix.css;
        default_type text/css;
        add_header Cache-Control "no-store";
    }

    location = /georivo-blog-nav.js {
        alias /var/www/georivo-blog/georivo-blog-nav.js;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=300";
    }

    location /blog-assets/ {
        alias /var/www/georivo-blog/;
        add_header Cache-Control "public, max-age=3600";
    }

    location ~ ^/(?:blog|guides|templates|examples|embed|use-cases)(?:/|$) {
        proxy_pass http://127.0.0.1:13340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(?:en|de|es|fr|ru)/(?:blog|guides|templates|examples|embed|use-cases)(?:/|$) {
        proxy_pass http://127.0.0.1:13340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /content-preview/ {
        proxy_pass http://127.0.0.1:13340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:13340;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass https://georivo-flyover.hello652718.chatgpt.site;
        proxy_ssl_server_name on;
        proxy_ssl_name georivo-flyover.hello652718.chatgpt.site;
        proxy_set_header Host georivo-flyover.hello652718.chatgpt.site;
        proxy_set_header Accept-Encoding "";
        include /etc/nginx/georivo-sites-auth.conf;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_once on;
        sub_filter '</head>' '<link rel="stylesheet" href="/georivo-mobile-fix.css?v=20260723b"><script src="/georivo-blog-nav.js?v=20260724d" defer></script></head>';
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
